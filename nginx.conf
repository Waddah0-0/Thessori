events {}
http {
  include /etc/nginx/mime.types;
  server {
    listen 80;

    # Serve the React build
    location / {
      root /app/ui_dist;
      try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI
    location /api/ {
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
    }
  }
}
